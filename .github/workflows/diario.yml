name: Orquestrador Diário

on:
  schedule:
    # Roda todo dia às 06:00 horário de Brasília (09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  buscar-voos-diario:
    runs-on: ubuntu-latest
    environment: main

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar secrets configurados
        run: |
          if [ -z "$RAPIDAPI_KEY" ]; then echo "❌ RAPIDAPI_KEY não configurado!"; exit 1; fi
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then echo "❌ TELEGRAM_BOT_TOKEN não configurado!"; exit 1; fi
          if [ -z "$TELEGRAM_CHANNEL_ID" ]; then echo "❌ TELEGRAM_CHANNEL_ID não configurado!"; exit 1; fi
          echo "✅ Todos os secrets estão configurados"

      - name: Instalar dependências
        run: npm install

      - name: Executar orquestrador diário
        run: node orquestrador_diario.js
