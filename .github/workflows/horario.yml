name: Orquestrador Horário

on:
  workflow_dispatch: # disparado pelo cron-job.org todo início de hora

jobs:
  buscar-voos-horario:
    runs-on: ubuntu-latest
    environment: main

    env:
      TZ: America/Sao_Paulo
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar secrets configurados
        run: |
          if [ -z "$RAPIDAPI_KEY" ]; then echo "❌ RAPIDAPI_KEY não configurado!"; exit 1; fi
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then echo "❌ TELEGRAM_BOT_TOKEN não configurado!"; exit 1; fi
          if [ -z "$TELEGRAM_CHANNEL_ID" ]; then echo "❌ TELEGRAM_CHANNEL_ID não configurado!"; exit 1; fi
          echo "✅ Todos os secrets estão configurados"

      - name: Instalar dependências
        run: npm install

      - name: Executar orquestrador horário
        run: node orquestrador_horario.js
